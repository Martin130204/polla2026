<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Polla 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#07090F;color:#F1F5F9;min-height:100vh;padding-bottom:2rem}
.nav{background:#0D1220;border-bottom:1px solid rgba(255,255,255,.07);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.nav-title{font-size:16px;font-weight:700;color:#F5BC00}
.nav-sub{font-size:11px;color:#64748B}
.wrap{max-width:520px;margin:0 auto;padding:0 1.25rem}
.login-card{background:#0D1220;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:2rem;text-align:center;max-width:320px;margin:3rem auto}
.login-title{font-size:18px;font-weight:700;margin-bottom:1.5rem;color:#F5BC00}
.inp{width:100%;height:44px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:0 14px;font-size:15px;color:#F1F5F9;outline:none;margin-bottom:1rem}
.inp:focus{border-color:#F5BC00}
.btn{width:100%;height:44px;background:linear-gradient(135deg,#F5BC00,#E85D04);border:none;border-radius:10px;color:#07090F;font-size:15px;font-weight:700;cursor:pointer;transition:.15s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sec{background:rgba(255,255,255,.06);color:#F1F5F9;border:1px solid rgba(255,255,255,.1)}
.section{background:#0D1220;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:1.25rem;margin-bottom:1rem}
.section-title{font-size:13px;font-weight:700;color:#F5BC00;letter-spacing:.08em;text-transform:uppercase;margin-bottom:1rem}
.player-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.player-row:last-child{border-bottom:none}
.player-name{font-size:13px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.score-inp{width:52px;height:34px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:0 8px;font-size:14px;font-weight:700;color:#F1F5F9;text-align:center;outline:none}
.score-inp:focus{border-color:#F5BC00}
.score-lbl{font-size:10px;color:#64748B;text-align:center;white-space:nowrap}
.cols{display:grid;grid-template-columns:repeat(4,52px);gap:4px}
.col-hdrs{display:grid;grid-template-columns:repeat(4,52px);gap:4px;margin-bottom:4px}
.col-hdr{font-size:9px;color:#64748B;text-align:center;font-weight:600;letter-spacing:.05em}
.ronda-select{width:100%;height:40px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:0 12px;font-size:14px;color:#F1F5F9;outline:none;margin-bottom:1rem}
.status{padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;text-align:center;margin-bottom:1rem}
.status.ok{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.15)}
.status.err{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.15)}
.status.info{background:rgba(245,188,0,.08);color:#F5BC00;border:1px solid rgba(245,188,0,.15)}
.total-badge{font-size:18px;font-weight:800;color:#F5BC00}
#loginPage,#adminPage{display:none}
#loginPage.show,#adminPage.show{display:block}
</style>
</head>
<body>
<div class="nav">
  <div>
    <div class="nav-title">⚙️ Admin — Polla 2026</div>
    <div class="nav-sub">Solo para Martin</div>
  </div>
  <button class="btn btn-sec" style="width:auto;padding:0 14px;height:36px;font-size:12px" onclick="logout()" id="logoutBtn" style="display:none">Salir</button>
</div>

<div class="wrap">

  <!-- LOGIN -->
  <div id="loginPage" class="show">
    <div class="login-card">
      <div class="login-title">🔐 Acceso Admin</div>
      <input class="inp" type="password" id="pwdInp" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="btn" onclick="doLogin()">Entrar</button>
      <div id="loginErr" style="color:#f87171;font-size:12px;margin-top:.75rem"></div>
    </div>
  </div>

  <!-- ADMIN -->
  <div id="adminPage">
    <div id="statusMsg"></div>

    <!-- Ronda actual -->
    <div class="section">
      <div class="section-title">Ronda actual</div>
      <select class="ronda-select" id="rondaSelect">
        <option>16avos</option>
        <option>Octavos</option>
        <option>Cuartos</option>
        <option>Semis</option>
        <option>3er lugar</option>
        <option>Final</option>
      </select>
    </div>

    <!-- Puntajes -->
    <div class="section">
      <div class="section-title">Puntajes por jugador</div>
      <div class="col-hdrs" style="margin-left:auto;margin-right:0;width:calc(4*52px + 3*4px + 160px);display:flex;gap:4px;padding-left:160px">
        <div class="col-hdr">16avos</div>
        <div class="col-hdr">Octavos</div>
        <div class="col-hdr">Cuartos</div>
        <div class="col-hdr">Semis</div>
        <div class="col-hdr">Extras</div>
        <div class="col-hdr">Marc.</div>
        <div class="col-hdr">TOTAL</div>
      </div>
      <div id="playersGrid"></div>
    </div>

    <button class="btn" onclick="saveData()" id="saveBtn">💾 Guardar y publicar</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FB_CFG = {
  apiKey: "AIzaSyAve5JBF1474PhnyLFbcVs4W4r-i1tsB_c",
  authDomain: "polla2026-712d9.firebaseapp.com",
  projectId: "polla2026-712d9",
  storageBucket: "polla2026-712d9.firebasestorage.app",
  messagingSenderId: "286533100308",
  appId: "1:286533100308:web:fe298312ea52ce32351801"
};

const ADMIN_PWD = "polla2026admin"; // Cambia esta contraseña

const PLAYERS = [
  "Martin Muñoz","Matias Palma","Sebastian Bustos","Vicente Salah","Joaquin Zarate",
  "Gabriel Lobos","Gustavo Yañez","Giancarlo Dall'Orso","Sergio Barrios","Kevin Alvarez",
  "Joaquin Paoa","Nicolas Lara","Francisco Castañon","Ignacio Soto","Lucas Barril"
];

const app = initializeApp(FB_CFG);
const db  = getFirestore(app);

// Exponer funciones al scope global
window.doLogin = function(){
  const pwd = document.getElementById('pwdInp').value;
  if(pwd === ADMIN_PWD){
    document.getElementById('loginPage').classList.remove('show');
    document.getElementById('adminPage').classList.add('show');
    document.getElementById('logoutBtn').style.display='block';
    loadCurrentData();
  } else {
    document.getElementById('loginErr').textContent = 'Contraseña incorrecta';
  }
};

window.logout = function(){
  document.getElementById('loginPage').classList.add('show');
  document.getElementById('adminPage').classList.remove('show');
  document.getElementById('logoutBtn').style.display='none';
  document.getElementById('pwdInp').value='';
};

function buildGrid(savedData){
  const grid = document.getElementById('playersGrid');
  grid.innerHTML = PLAYERS.map((name,i)=>{
    const saved = savedData?.puntajes?.find(p=>p.name===name)||{};
    return`<div class="player-row">
      <div class="player-name">${name.split(' ')[0]}</div>
      <div style="display:flex;gap:4px;align-items:center">
        <input class="score-inp" type="number" min="0" max="200" value="${saved.pts_32||0}" id="p${i}_32" title="16avos">
        <input class="score-inp" type="number" min="0" max="200" value="${saved.pts_oct||0}" id="p${i}_oct" title="Octavos">
        <input class="score-inp" type="number" min="0" max="200" value="${saved.pts_cua||0}" id="p${i}_cua" title="Cuartos">
        <input class="score-inp" type="number" min="0" max="200" value="${saved.pts_sem||0}" id="p${i}_sem" title="Semis">
        <input class="score-inp" type="number" min="0" max="200" value="${saved.pts_ext||0}" id="p${i}_ext" title="Extras">
        <input class="score-inp" type="number" min="0" max="200" value="${saved.marc||0}" id="p${i}_marc" title="Marc. exactos">
        <div class="total-badge" id="p${i}_total">${saved.total||0}</div>
      </div>
    </div>`;
  }).join('');

  // Calcular total en tiempo real
  PLAYERS.forEach((_,i)=>{
    const fields=['32','oct','cua','sem','ext'];
    fields.forEach(f=>{
      document.getElementById(`p${i}_${f}`).addEventListener('input',()=>updateTotal(i));
    });
    updateTotal(i);
  });
}

function updateTotal(i){
  const v=f=>parseInt(document.getElementById(`p${i}_${f}`)?.value)||0;
  const total=v('32')+v('oct')+v('cua')+v('sem')+v('ext');
  const el=document.getElementById(`p${i}_total`);
  if(el) el.textContent=total;
}

async function loadCurrentData(){
  showStatus('Cargando datos actuales...','info');
  try{
    const snap = await getDoc(doc(db,'polla2026','datos'));
    const data = snap.exists() ? snap.data() : {};
    if(data.ronda) document.getElementById('rondaSelect').value=data.ronda;
    buildGrid(data);
    showStatus('','');
  } catch(e){
    buildGrid({});
    showStatus('⚠️ Sin conexión a Firebase, ingresa los datos manualmente','err');
  }
}

window.saveData = async function(){
  const btn=document.getElementById('saveBtn');
  btn.disabled=true;
  btn.textContent='Guardando...';
  showStatus('Guardando...','info');

  const puntajes = PLAYERS.map((name,i)=>{
    const v=f=>parseInt(document.getElementById(`p${i}_${f}`)?.value)||0;
    const total=v('32')+v('oct')+v('cua')+v('sem')+v('ext');
    return {
      name, total,
      pts_32:v('32'), pts_oct:v('oct'), pts_cua:v('cua'),
      pts_sem:v('sem'), pts_ext:v('ext'), marc:v('marc'),
      prev: i+1 // Se actualiza con el ranking anterior
    };
  });

  // Calcular ranking anterior (prev) basado en orden actual antes de guardar
  const sorted=[...puntajes].sort((a,b)=>b.total-a.total||b.marc-a.marc);
  puntajes.forEach(p=>{ p.prev=sorted.findIndex(s=>s.name===p.name)+1; });

  const ronda = document.getElementById('rondaSelect').value;

  try{
    await setDoc(doc(db,'polla2026','datos'),{ puntajes, ronda, updatedAt: new Date().toISOString() });
    showStatus('✅ Datos publicados correctamente — la web se actualizó al instante','ok');
  } catch(e){
    showStatus('❌ Error al guardar: '+e.message,'err');
  }
  btn.disabled=false;
  btn.textContent='💾 Guardar y publicar';
};

function showStatus(msg,type){
  const el=document.getElementById('statusMsg');
  if(!msg){el.innerHTML='';return;}
  el.innerHTML=`<div class="status ${type}">${msg}</div>`;
}
</script>
</body>
</html>
