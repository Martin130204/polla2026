<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Polla 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#07090F;color:#F1F5F9;min-height:100vh;padding-bottom:3rem}
.nav{background:#0D1220;border-bottom:1px solid rgba(255,255,255,.07);padding:.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.nav-title{font-size:15px;font-weight:700;color:#F5BC00}
.nav-sub{font-size:10px;color:#475569;margin-top:1px}
.wrap{max-width:600px;margin:0 auto;padding:1.25rem}
.login-card{background:#0D1220;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:2rem;text-align:center;max-width:300px;margin:3rem auto}
.login-title{font-size:17px;font-weight:700;margin-bottom:1.5rem;color:#F5BC00}
.inp{width:100%;height:42px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:0 13px;font-size:14px;color:#F1F5F9;outline:none;margin-bottom:.85rem;font-family:inherit}
.inp:focus{border-color:#F5BC00}
.btn{width:100%;height:42px;background:linear-gradient(135deg,#F5BC00,#E85D04);border:none;border-radius:10px;color:#07090F;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-out{background:rgba(255,255,255,.06);color:#F1F5F9;border:1px solid rgba(255,255,255,.1);width:auto;padding:0 14px;height:34px;font-size:12px}
.btn-sm{background:rgba(245,188,0,.1);color:#F5BC00;border:1px solid rgba(245,188,0,.2);width:auto;padding:0 12px;height:32px;font-size:12px;font-weight:600;border-radius:8px;cursor:pointer;font-family:inherit}
.card{background:#0D1220;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:1.15rem;margin-bottom:.85rem}
.card-title{font-size:11px;font-weight:700;color:#F5BC00;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.card-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}
.ronda-sel{width:100%;height:40px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:0 12px;font-size:14px;color:#F1F5F9;outline:none;font-family:inherit}
.si{width:44px;height:32px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:0 5px;font-size:13px;font-weight:700;color:#F1F5F9;text-align:center;outline:none;font-family:inherit}
.si:focus{border-color:#F5BC00}
.ei{height:32px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:0 8px;font-size:12px;color:#F1F5F9;outline:none;font-family:inherit;width:100%}
.ei:focus{border-color:#F5BC00}
.total-v{font-size:15px;font-weight:800;color:#F5BC00;min-width:28px;text-align:center;display:block}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:10px;font-weight:700;color:#64748B;letter-spacing:.06em;text-transform:uppercase;padding:5px 5px;text-align:center;border-bottom:1px solid rgba(255,255,255,.06);white-space:nowrap}
.tbl th:first-child{text-align:left}
.tbl td{padding:5px 4px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.ext-tbl{width:100%;border-collapse:collapse;font-size:12px}
.ext-tbl th{font-size:10px;font-weight:700;color:#64748B;letter-spacing:.06em;text-transform:uppercase;padding:5px 6px;text-align:left;border-bottom:1px solid rgba(255,255,255,.06);white-space:nowrap}
.ext-tbl td{padding:5px 4px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.ext-tbl tr:last-child td{border-bottom:none}
.av{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;vertical-align:middle;margin-right:5px}
.pname{font-size:12px;font-weight:600;white-space:nowrap;display:inline}
.status{padding:9px 13px;border-radius:10px;font-size:12px;font-weight:600;text-align:center;margin-bottom:.85rem}
.s-ok{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.15)}
.s-err{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.15)}
.s-inf{background:rgba(245,188,0,.08);color:#F5BC00;border:1px solid rgba(245,188,0,.15)}
.bk-tabs{display:flex;gap:0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;overflow:hidden;margin-bottom:1rem;flex-wrap:wrap}
.bk-tab{flex:1;min-width:60px;padding:7px 4px;font-size:11px;font-weight:600;text-align:center;cursor:pointer;border:none;background:none;color:rgba(255,255,255,.4);font-family:inherit;transition:.15s}
.bk-tab.active{background:rgba(245,188,0,.1);color:#F5BC00}
.match-edit{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px 12px;margin-bottom:6px}
.match-edit-hdr{font-size:10px;font-weight:700;color:#64748B;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.match-row{display:grid;grid-template-columns:1fr 36px 36px 1fr 80px;gap:6px;align-items:center}
.match-row-lbl{font-size:10px;color:#64748B;text-align:center;margin-bottom:2px}
.mteam{height:32px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:0 8px;font-size:12px;color:#F1F5F9;outline:none;font-family:inherit;width:100%}
.mteam:focus{border-color:#F5BC00}
.mscore{width:100%;height:32px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:0 4px;font-size:13px;font-weight:700;color:#F1F5F9;text-align:center;outline:none;font-family:inherit}
.mscore:focus{border-color:#F5BC00}
.mwin{height:32px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:0 6px;font-size:11px;color:#F1F5F9;outline:none;font-family:inherit;width:100%}
.mwin:focus{border-color:#F5BC00}
.flag-preview{font-size:16px;text-align:center}
#loginPage,#adminPage{display:none}
#loginPage.show,#adminPage.show{display:block}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
</style>
</head>
<body>

<div class="nav">
  <div>
    <div class="nav-title">⚙️ Admin — Polla 2026</div>
    <div class="nav-sub">Solo para Martin</div>
  </div>
  <button class="btn btn-out" onclick="logout()" id="logoutBtn" style="display:none">Salir</button>
</div>

<div class="wrap">

  <div id="loginPage" class="show">
    <div class="login-card">
      <div class="login-title">🔐 Acceso Admin</div>
      <input class="inp" type="password" id="pwdInp" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="btn" onclick="doLogin()">Entrar</button>
      <div id="loginErr" style="color:#f87171;font-size:12px;margin-top:.65rem"></div>
    </div>
  </div>

  <div id="adminPage">
    <div id="statusMsg"></div>

    <!-- Ronda actual -->
    <div class="card">
      <div class="card-title">Ronda actual</div>
      <select class="ronda-sel" id="rondaSelect">
        <option>16avos</option><option>Octavos</option><option>Cuartos</option>
        <option>Semis</option><option>3er lugar</option><option>Final</option>
      </select>
    </div>

    <!-- Puntajes -->
    <div class="card">
      <div class="card-title">Puntajes por jugador</div>
      <div class="tbl-wrap">
        <table class="tbl">
          <thead>
            <tr>
              <th>Jugador</th>
              <th>16avos</th><th>Octavos</th><th>Cuartos</th>
              <th>Semis</th><th>Extras</th><th>Marc.</th><th>TOTAL</th>
            </tr>
          </thead>
          <tbody id="scoresBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Extras -->
    <div class="card">
      <div class="card-title">Extras — Campeón, Top3 y Sorpresa</div>
      <div class="tbl-wrap">
        <table class="ext-tbl">
          <thead>
            <tr><th>Jugador</th><th>🏆 Campeón</th><th>🥈 2do</th><th>🥉 3ro</th><th>⚡ Sorpresa</th></tr>
          </thead>
          <tbody id="extrasBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Llaves -->
    <div class="card">
      <div class="card-title">Llaves del torneo</div>
      <div class="bk-tabs" id="bkTabs"></div>
      <div id="bkEditor"></div>
    </div>

    <button class="btn" onclick="saveData()" id="saveBtn">💾 Guardar y publicar todo</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FB_CFG={
  apiKey:"AIzaSyAve5JBF1474PhnyLFbcVs4W4r-i1tsB_c",
  authDomain:"polla2026-712d9.firebaseapp.com",
  projectId:"polla2026-712d9",
  storageBucket:"polla2026-712d9.firebasestorage.app",
  messagingSenderId:"286533100308",
  appId:"1:286533100308:web:fe298312ea52ce32351801"
};
const ADMIN_PWD="polla2026admin";

const PLAYERS=[
  {name:"Martin Muñoz",col:"#E94560"},{name:"Matias Palma",col:"#F5A623"},
  {name:"Sebastian Bustos",col:"#3B82F6"},{name:"Vicente Salah",col:"#22C55E"},
  {name:"Joaquin Zarate",col:"#A855F7"},{name:"Gabriel Lobos",col:"#F97316"},
  {name:"Gustavo Yañez",col:"#06B6D4"},{name:"Giancarlo Dall'Orso",col:"#EC4899"},
  {name:"Sergio Barrios",col:"#84CC16"},{name:"Kevin Alvarez",col:"#EAB308"},
  {name:"Joaquin Paoa",col:"#6366F1"},{name:"Nicolas Lara",col:"#14B8A6"},
  {name:"Francisco Castañon",col:"#F43F5E"},{name:"Ignacio Soto",col:"#8B5CF6"},
  {name:"Lucas Barril",col:"#0EA5E9"},
];

const FL={
  'Brasil':'🇧🇷','Alemania':'🇩🇪','Francia':'🇫🇷','España':'🇪🇸',
  'Paises Bajos':'🇳🇱','Marruecos':'🇲🇦','Argentina':'🇦🇷','Portugal':'🇵🇹',
  'Mexico':'🇲🇽','Inglaterra':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Estados Unidos':'🇺🇸','Japon':'🇯🇵',
  'Corea del Sur':'🇰🇷','Croacia':'🇭🇷','Suiza':'🇨🇭','Polonia':'🇵🇱',
  'Australia':'🇦🇺','Canada':'🇨🇦','Senegal':'🇸🇳','Uruguay':'🇺🇾',
  'Belgica':'🇧🇪','Colombia':'🇨🇴','Ecuador':'🇪🇨','Chile':'🇨🇱',
  'Paraguay':'🇵🇾','Noruega':'🇳🇴','Suecia':'🇸🇪','Egipto':'🇪🇬',
  'Argelia':'🇩🇿','Austria':'🇦🇹','Ghana':'🇬🇭','Congo':'🇨🇬',
  'Bosnia':'🇧🇦','Sudafrica':'🇿🇦','Cabo Verde':'🇨🇻','Costa de Marfil':'🇨🇮',
  'Dinamarca':'🇩🇰','Serbia':'🇷🇸','Tunez':'🇹🇳','Nigeria':'🇳🇬',
  'Camerun':'🇨🇲','Qatar':'🇶🇦','Arabia Saudita':'🇸🇦','Costa Rica':'🇨🇷',
};
const flag=n=>FL[n]||'❓';

const BK_ROUNDS=[
  {k:'roundOf32',l:'16avos',n:16,d:'28 jun – 3 jul'},
  {k:'roundOf16',l:'Octavos',n:8,d:'4–7 jul'},
  {k:'quarterFinals',l:'Cuartos',n:4,d:'9–11 jul'},
  {k:'semiFinals',l:'Semis',n:2,d:'14–15 jul'},
  {k:'thirdPlace',l:'3er lugar',n:1,d:'18 jul'},
  {k:'final',l:'Final',n:1,d:'19 jul'},
];

const BRACKET_DEFAULT={
  roundOf32:[
    {t1:'Sudafrica',s1:null,t2:'Canada',s2:null,w:'',d:'28 jun'},
    {t1:'Brasil',s1:null,t2:'Japon',s2:null,w:'',d:'29 jun'},
    {t1:'Alemania',s1:null,t2:'Paraguay',s2:null,w:'',d:'29 jun'},
    {t1:'Paises Bajos',s1:null,t2:'Marruecos',s2:null,w:'',d:'29 jun'},
    {t1:'Costa de Marfil',s1:null,t2:'Noruega',s2:null,w:'',d:'30 jun'},
    {t1:'Francia',s1:null,t2:'Suecia',s2:null,w:'',d:'30 jun'},
    {t1:'Mexico',s1:null,t2:'Ecuador',s2:null,w:'',d:'30 jun'},
    {t1:'Inglaterra',s1:null,t2:'Congo',s2:null,w:'',d:'1 jul'},
    {t1:'Belgica',s1:null,t2:'Senegal',s2:null,w:'',d:'1 jul'},
    {t1:'Estados Unidos',s1:null,t2:'Bosnia',s2:null,w:'',d:'1 jul'},
    {t1:'España',s1:null,t2:'Austria',s2:null,w:'',d:'2 jul'},
    {t1:'Portugal',s1:null,t2:'Croacia',s2:null,w:'',d:'2 jul'},
    {t1:'Suiza',s1:null,t2:'Argelia',s2:null,w:'',d:'2 jul'},
    {t1:'Australia',s1:null,t2:'Egipto',s2:null,w:'',d:'3 jul'},
    {t1:'Argentina',s1:null,t2:'Cabo Verde',s2:null,w:'',d:'3 jul'},
    {t1:'Colombia',s1:null,t2:'Ghana',s2:null,w:'',d:'3 jul'},
  ],
  roundOf16:Array(8).fill(null).map((_,i)=>({t1:'',s1:null,t2:'',s2:null,w:'',d:'4-7 jul'})),
  quarterFinals:Array(4).fill(null).map(()=>({t1:'',s1:null,t2:'',s2:null,w:'',d:'9-11 jul'})),
  semiFinals:Array(2).fill(null).map(()=>({t1:'',s1:null,t2:'',s2:null,w:'',d:'14-15 jul'})),
  thirdPlace:[{t1:'',s1:null,t2:'',s2:null,w:'',d:'18 jul'}],
  final:[{t1:'',s1:null,t2:'',s2:null,w:'',d:'19 jul'}],
};

let BRACKET=JSON.parse(JSON.stringify(BRACKET_DEFAULT));
let curBkTab=0;

const app=initializeApp(FB_CFG);
const db=getFirestore(app);

// ─── AUTH ─────────────────────────────────────────────────
window.doLogin=()=>{
  const pwd=document.getElementById('pwdInp').value;
  if(pwd===ADMIN_PWD){
    document.getElementById('loginPage').classList.remove('show');
    document.getElementById('adminPage').classList.add('show');
    document.getElementById('logoutBtn').style.display='block';
    loadCurrentData();
  } else {
    document.getElementById('loginErr').textContent='Contraseña incorrecta';
  }
};
window.logout=()=>{
  document.getElementById('loginPage').classList.add('show');
  document.getElementById('adminPage').classList.remove('show');
  document.getElementById('logoutBtn').style.display='none';
  document.getElementById('pwdInp').value='';
};

// ─── HELPERS ──────────────────────────────────────────────
function ini(name){return name.split(' ').map(w=>w[0]).slice(0,2).join('')}
function showStatus(msg,cls){
  const el=document.getElementById('statusMsg');
  el.innerHTML=msg?`<div class="status ${cls}">${msg}</div>`:'';
}

// ─── PUNTAJES ─────────────────────────────────────────────
function buildScoresTable(saved){
  document.getElementById('scoresBody').innerHTML=PLAYERS.map((p,i)=>{
    const s=saved?.find(x=>x.name===p.name)||{};
    return`<tr>
      <td><span class="av" style="background:${p.col}">${ini(p.name)}</span><span class="pname">${p.name.split(' ')[0]}</span></td>
      ${['32','oct','cua','sem','ext'].map(f=>`<td><input class="si" type="number" min="0" max="300" value="${s['pts_'+f]||0}" id="p${i}_${f}" oninput="updT(${i})"></td>`).join('')}
      <td><input class="si" type="number" min="0" max="300" value="${s.marc||0}" id="p${i}_marc"></td>
      <td><span class="total-v" id="p${i}_total">${s.total||0}</span></td>
    </tr>`;
  }).join('');
  PLAYERS.forEach((_,i)=>updT(i));
}
window.updT=(i)=>{
  const v=f=>parseInt(document.getElementById(`p${i}_${f}`)?.value)||0;
  document.getElementById(`p${i}_total`).textContent=v('32')+v('oct')+v('cua')+v('sem')+v('ext');
};

// ─── EXTRAS ───────────────────────────────────────────────
function buildExtrasTable(saved){
  document.getElementById('extrasBody').innerHTML=PLAYERS.map((p,i)=>{
    const s=saved?.find(x=>x.name===p.name)||{};
    return`<tr>
      <td><span class="av" style="background:${p.col}">${ini(p.name)}</span><span class="pname">${p.name.split(' ')[0]}</span></td>
      <td><input class="ei" type="text" placeholder="España" value="${s.camp||''}" id="e${i}_camp"></td>
      <td><input class="ei" type="text" placeholder="Argentina" value="${s.t2||''}" id="e${i}_t2"></td>
      <td><input class="ei" type="text" placeholder="Francia" value="${s.t3||''}" id="e${i}_t3"></td>
      <td><input class="ei" type="text" placeholder="Marruecos" value="${s.sorpresa||''}" id="e${i}_sorpresa"></td>
    </tr>`;
  }).join('');
}

// ─── BRACKET EDITOR ───────────────────────────────────────
function buildBkTabs(){
  document.getElementById('bkTabs').innerHTML=BK_ROUNDS.map((r,i)=>
    `<button class="bk-tab${i===0?' active':''}" onclick="selBkTab(${i})">${r.l}</button>`
  ).join('');
}
window.selBkTab=(idx)=>{
  curBkTab=idx;
  document.querySelectorAll('.bk-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  renderBkEditor(idx);
};
function renderBkEditor(idx){
  const r=BK_ROUNDS[idx];
  const ms=BRACKET[r.k]||[];
  document.getElementById('bkEditor').innerHTML=ms.map((m,i)=>{
    const f1=flag(m.t1),f2=flag(m.t2);
    return`<div class="match-edit">
      <div class="match-edit-hdr">Partido ${i+1} · ${m.d||r.d}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div>
          <div class="match-row-lbl">Equipo 1 ${m.t1?f1:''}</div>
          <input class="mteam" type="text" value="${m.t1||''}" placeholder="Ej: España" id="bk_${idx}_${i}_t1" oninput="updFlag(${idx},${i},1,this.value)">
        </div>
        <div>
          <div class="match-row-lbl">Equipo 2 ${m.t2?f2:''}</div>
          <input class="mteam" type="text" value="${m.t2||''}" placeholder="Ej: Argentina" id="bk_${idx}_${i}_t2" oninput="updFlag(${idx},${i},2,this.value)">
        </div>
      </div>
      <div style="display:grid;grid-template-columns:60px 60px 1fr;gap:8px;align-items:center">
        <div>
          <div class="match-row-lbl">Goles E1</div>
          <input class="mscore" type="number" min="0" max="20" value="${m.s1??''}" placeholder="-" id="bk_${idx}_${i}_s1">
        </div>
        <div>
          <div class="match-row-lbl">Goles E2</div>
          <input class="mscore" type="number" min="0" max="20" value="${m.s2??''}" placeholder="-" id="bk_${idx}_${i}_s2">
        </div>
        <div>
          <div class="match-row-lbl">Clasificado</div>
          <select class="mwin" id="bk_${idx}_${i}_w">
            <option value="">Sin resultado</option>
            <option value="team1" ${m.w==='team1'?'selected':''}>→ ${m.t1||'Equipo 1'}</option>
            <option value="team2" ${m.w==='team2'?'selected':''}>→ ${m.t2||'Equipo 2'}</option>
          </select>
        </div>
      </div>
    </div>`;
  }).join('');
}
window.updFlag=(tabIdx,mIdx,team,val)=>{
  // Actualizar label de bandera en tiempo real
  const el=document.getElementById(`bk_${tabIdx}_${mIdx}_t${team}`);
  const f=flag(val);
  if(el){
    const lbl=el.previousElementSibling;
    const baseName=team===1?'Equipo 1':'Equipo 2';
    if(lbl) lbl.textContent=val?`${baseName} ${f}`:baseName;
  }
  // Actualizar select de ganador
  const sel=document.getElementById(`bk_${tabIdx}_${mIdx}_w`);
  if(sel){
    sel.options[1].text=`→ ${document.getElementById(`bk_${tabIdx}_${mIdx}_t1`)?.value||'Equipo 1'}`;
    sel.options[2].text=`→ ${document.getElementById(`bk_${tabIdx}_${mIdx}_t2`)?.value||'Equipo 2'}`;
  }
};

function readBracketFromUI(){
  const bk={};
  BK_ROUNDS.forEach(({k},idx)=>{
    const ms=BRACKET[k]||[];
    bk[k]=ms.map((m,i)=>{
      const t1=(document.getElementById(`bk_${idx}_${i}_t1`)?.value||m.t1||'').trim();
      const t2=(document.getElementById(`bk_${idx}_${i}_t2`)?.value||m.t2||'').trim();
      const s1v=document.getElementById(`bk_${idx}_${i}_s1`)?.value;
      const s2v=document.getElementById(`bk_${idx}_${i}_s2`)?.value;
      const w=document.getElementById(`bk_${idx}_${i}_w`)?.value||m.w||'';
      return{t1,t2,f1:flag(t1),f2:flag(t2),s1:s1v!==''?parseInt(s1v):null,s2:s2v!==''?parseInt(s2v):null,w,d:m.d||''};
    });
  });
  return bk;
}

// ─── LOAD ─────────────────────────────────────────────────
async function loadCurrentData(){
  showStatus('Cargando datos...','s-inf');
  try{
    const snap=await getDoc(doc(db,'polla2026','datos'));
    const data=snap.exists()?snap.data():{};
    if(data.ronda) document.getElementById('rondaSelect').value=data.ronda;
    buildScoresTable(data.puntajes||[]);
    buildExtrasTable(data.puntajes||[]);
    // Cargar bracket guardado
    if(data.bracket){
      BK_ROUNDS.forEach(({k})=>{
        if(data.bracket[k]) BRACKET[k]=data.bracket[k];
      });
    }
    buildBkTabs();
    renderBkEditor(0);
    showStatus('','');
  } catch(e){
    buildScoresTable([]);buildExtrasTable([]);
    BRACKET=JSON.parse(JSON.stringify(BRACKET_DEFAULT));
    buildBkTabs();renderBkEditor(0);
    showStatus('⚠️ Sin conexión a Firebase','s-err');
  }
}

// ─── SAVE ─────────────────────────────────────────────────
window.saveData=async()=>{
  const btn=document.getElementById('saveBtn');
  btn.disabled=true;btn.textContent='Guardando...';
  showStatus('Guardando...','s-inf');

  const puntajes=PLAYERS.map((p,i)=>{
    const v=f=>parseInt(document.getElementById(`p${i}_${f}`)?.value)||0;
    const str=f=>document.getElementById(`e${i}_${f}`)?.value.trim()||null;
    const total=v('32')+v('oct')+v('cua')+v('sem')+v('ext');
    return{name:p.name,total,pts_32:v('32'),pts_oct:v('oct'),pts_cua:v('cua'),
      pts_sem:v('sem'),pts_ext:v('ext'),marc:v('marc'),
      camp:str('camp'),t2:str('t2'),t3:str('t3'),sorpresa:str('sorpresa'),prev:i+1};
  });
  const sorted=[...puntajes].sort((a,b)=>b.total-a.total||b.marc-a.marc);
  puntajes.forEach(p=>{p.prev=sorted.findIndex(s=>s.name===p.name)+1;});

  const ronda=document.getElementById('rondaSelect').value;
  const bracket=readBracketFromUI();

  try{
    await setDoc(doc(db,'polla2026','datos'),{puntajes,ronda,bracket,updatedAt:new Date().toISOString()});
    showStatus('✅ Todo publicado — puntajes, extras y llaves actualizados','s-ok');
  } catch(e){
    showStatus('❌ Error: '+e.message,'s-err');
  }
  btn.disabled=false;btn.textContent='💾 Guardar y publicar todo';
};
</script>
